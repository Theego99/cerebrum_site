<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Studio Cerebrum</title>
  <meta name="description" content="Studio Cerebrum — an interdisciplinary practice across publication, textile, sculpture, and installation." />
  <meta name="theme-color" content="#ffffff" />

  <link rel="icon" type="image/jpeg" href="assets/wordmark.jpg" />
  <link rel="apple-touch-icon" href="assets/wordmark.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body id="top">

  <!-- 1. Fixed corner mark — fades in after the hero scrolls away -->
  <a class="markmini" href="#top" aria-label="Studio Cerebrum — back to top" data-mark hidden>
    <img src="assets/wordmark.jpg" alt="" width="120" height="92" />
  </a>

  <!-- 2. Hero -->
  <header class="hero">
    <img class="wordmark" src="assets/wordmark.jpg"
         alt="Studio Cerebrum wordmark, hand-drawn in coloured pencil"
         width="912" height="668" />
    <!-- <h1>Studio Cerebrum works at the seam where material, memory, and labour are rewoven into form.</h1> -->
  </header>

  <!-- 3. Slideshow -->
  <section class="slideshow" aria-roledescription="carousel" aria-label="Selected works">
    <div class="mat">
      <div class="frame" data-frame>
        <figure class="slide is-active" role="group" aria-roledescription="slide" aria-label="1 of 5">
          <img src="assets/work-prato.jpg"
               alt="Hands holding an open zine; a yellow 3D-printed mesh net rests over a photographic insert of an outdoor installation."
               width="1209" height="615" />
          <figcaption>Zine — In good company with FF</figcaption>
        </figure>
        <figure class="slide" role="group" aria-roledescription="slide" aria-label="2 of 5">
          <img src="assets/work-zine.jpg" loading="lazy"
               alt="Zine spread for Case Study 1, Textile (Prato): a printed photograph of stacked crates of dyed wool under blue light, with handwritten field notes."
               width="788" height="591" />
          <figcaption>Zine — Case Study 1</figcaption>
        </figure>
        <figure class="slide" role="group" aria-roledescription="slide" aria-label="3 of 5">
          <img src="assets/work-rug.jpg" loading="lazy"
               alt="Two people holding a large hand-tufted rug outdoors at Daichuji temple, its pink and blue forms facing the camera."
               width="600" height="400" />
          <figcaption>Hand-tufted rug, held at Daichuji temple</figcaption>
        </figure>
        <figure class="slide" role="group" aria-roledescription="slide" aria-label="4 of 5">
          <img src="assets/Minipouch.jpg" loading="lazy"
               alt="A small hand-knitted blue drawstring pouch on a cord, with a carved bead, photographed on a dark reflective surface."
               width="3294" height="2329" />
          <figcaption>Minipouch</figcaption>
        </figure>
        <figure class="slide" role="group" aria-roledescription="slide" aria-label="5 of 5">
          <img src="assets/Rug.jpg" loading="lazy"
               alt="Close-up detail of a hand-tufted rug: abstract pink, white, black and yellow organic forms within a red border, on a pink-and-black ground."
               width="3507" height="2480" />
          <figcaption>Rug</figcaption>
        </figure>
      </div>
      <!-- fades to black between slides, masking the next image while it loads -->
      <div class="curtain" data-curtain aria-hidden="true"></div>
    </div>

    <div class="controls">
      <button class="prev" type="button" aria-label="Previous work">&larr;</button>
      <span class="counter" aria-live="polite"><span class="n">1</span>/5</span>
      <button class="next" type="button" aria-label="Next work">&rarr;</button>
    </div>
  </section>

  <!-- 4. Colophon -->
  <footer class="colophon">
    <p><strong>Studio Cerebrum</strong><br>Tokyo, London</p>
    <p>Enquiries — <a href="mailto:info.studiocerebrum@gmail.com">info.studiocerebrum@gmail.com</a><br>Instagram — <a href="https://www.instagram.com/studio_cerebrum/" target="_blank" rel="noopener">@studio_cerebrum</a></p>
    <p>© Studio Cerebrum 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
